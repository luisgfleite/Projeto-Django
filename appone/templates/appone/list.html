<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listando pessoas</title>
</head>
<body>
    <ul>
        {% for pessoa in pessoas %}
        <li>{{ pessoa.nome }}</li>
        <li>{{ pessoa.email}}</li>
        <li><a href="{% url 'atualizar_pessoa' pessoa.id %}">Editar</a></li>
        <li><a href="{% url 'apagar_pessoa' pessoa.id %}?delete_key=KASDJLAKSDJLKASJDLASJDLKAJSKDJALKSJDKLAJ">Apagar</a></li>
        <br>
        {% endfor %}
    </ul>
    <a href="{% url 'criar_pessoa' %}">Cadastrar nova pessoa</a>
</body>
</html>
