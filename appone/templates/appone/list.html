<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listando pessoas</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th colspan="2">Opções</th>
        </tr>
        {% for pessoa in pessoas %}
        <tr>
            <th>{{ pessoa.nome }}</th>
            <th>{{ pessoa.email }}</th>
            <td><a href="{% url 'atualizar_pessoa' pessoa.id %}">Editar</a></td>
            <td><a href="{% url 'apagar_pessoa' pessoa.id %}">Apagar</a></td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'criar_pessoa' %}">Cadastrar nova pessoa</a>
</body>
</html>
